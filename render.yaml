# render.yaml — Render deployment configuration for ResumeMatch AI
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: resumematch-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
