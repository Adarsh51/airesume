<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ResumeMatch AI — AI-powered resume screening and matching system" />
  <title>{% block title %}ResumeMatch AI{% endblock %}</title>

  <!-- Apply dark mode INSTANTLY before anything renders -->
  <script>
    (function() {
      var d = localStorage.getItem('darkMode');
      if (d === 'true' || (!d && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'tertiary-container': 'var(--tertiary-container)',
            'inverse-surface': 'var(--inverse-surface)',
            'error-container': 'var(--error-container)',
            'on-error': 'var(--on-error)',
            'surface': 'var(--surface)',
            'tertiary': 'var(--tertiary)',
            'surface-container-high': 'var(--surface-container-high)',
            'surface-container-lowest': 'var(--surface-container-lowest)',
            'primary': 'var(--primary)',
            'on-tertiary': 'var(--on-tertiary)',
            'on-surface': 'var(--on-surface)',
            'background': 'var(--background)',
            'surface-dim': 'var(--surface-dim)',
            'surface-tint': 'var(--surface-tint)',
            'on-surface-variant': 'var(--on-surface-variant)',
            'outline': 'var(--outline)',
            'on-secondary': 'var(--on-secondary)',
            'surface-variant': 'var(--surface-variant)',
            'error': 'var(--error)',
            'surface-container': 'var(--surface-container)',
            'inverse-on-surface': 'var(--inverse-on-surface)',
            'surface-container-low': 'var(--surface-container-low)',
            'primary-container': 'var(--primary-container)',
            'on-primary': 'var(--on-primary)',
            'secondary': 'var(--secondary)',
            'secondary-container': 'var(--secondary-container)',
            'on-tertiary-container': 'var(--on-tertiary-container)',
            'on-primary-container': 'var(--on-primary-container)',
            'on-secondary-container': 'var(--on-secondary-container)',
            'on-background': 'var(--on-background)',
            'outline-variant': 'var(--outline-variant)',
            'on-error-container': 'var(--on-error-container)',
            'inverse-primary': 'var(--inverse-primary)',
            'surface-container-highest': 'var(--surface-container-highest)',
            'tertiary-container': 'var(--tertiary-container)',
          },
          spacing: {
            'gutter': 'clamp(1rem, 3vw, 2rem)',
            'section': 'clamp(3rem, 8vw, 6rem)',
            'xl': 'clamp(2rem, 5vw, 4rem)',
          },
          fontFamily: {
            'display': ['"Inter"', 'sans-serif'],
            'headline': ['"Inter"', 'sans-serif'],
            'body': ['"Geist"', '"Inter"', 'sans-serif'],
          },
          zIndex: {
            'nav': '40',
            'overlay': '60',
            'toast': '70',
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Geist:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=3" />

  {% block head %}{% endblock %}
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative antialiased">
  <!-- Background Grid Pattern -->
  <div class="absolute inset-0 bg-grid-pattern pointer-events-none z-0"></div>

  <!-- ==================== HEADER ==================== -->
  <header class="fixed top-0 left-0 right-0 z-nav nav-glass">
    <nav class="max-w-[1440px] mx-auto w-full px-gutter flex items-center justify-between h-[64px]">
      <!-- Logo -->
      <a href="{{ url_for('index') }}" class="flex items-center gap-3 no-underline group">
        <div class="logo-icon group-hover:scale-105 transition-transform duration-200">R</div>
        <span class="font-headline-md text-headline-md text-on-surface hidden sm:block">
          Resume<span class="gradient-text-subtle">Match</span> AI
        </span>
      </a>

      <!-- Right Actions -->
      <div class="flex items-center gap-2">
        <!-- Dark Mode Toggle -->
        <button id="darkModeToggle" class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container hover:bg-surface-container-high border border-outline-variant/30 hover:border-primary/50 text-on-surface-variant hover:text-primary transition-all duration-200 cursor-pointer" aria-label="Toggle dark mode" title="Toggle dark mode">
          <span class="material-symbols-outlined dark-icon text-[20px]">dark_mode</span>
          <span class="material-symbols-outlined light-icon text-[20px]" style="display:none">light_mode</span>
        </button>

        <!-- Mobile Menu Button -->
        <button id="mobileMenuBtn" class="w-10 h-10 rounded-full items-center justify-center bg-surface-container hover:bg-surface-container-high border border-outline-variant/30 hover:border-primary/50 text-on-surface-variant hover:text-primary transition-all duration-200 cursor-pointer hidden max-md:flex" aria-label="Open menu">
          <span class="material-symbols-outlined text-[22px]">menu</span>
        </button>
      </div>
    </nav>
  </header>

  <!-- Mobile Menu Overlay -->
  <div id="mobileMenu" class="mobile-menu z-mobile-menu">
    <button id="mobileMenuClose" class="absolute top-5 right-5 w-10 h-10 rounded-full flex items-center justify-center bg-surface-container hover:bg-error/10 border border-outline-variant/30 text-on-surface-variant hover:text-error transition-all cursor-pointer" aria-label="Close menu">
      <span class="material-symbols-outlined text-[24px]">close</span>
    </button>
    <a href="{{ url_for('index') }}" class="mobile-menu-link">Home</a>
  </div>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="flex-1 relative z-10 pt-[88px] pb-xl px-gutter max-w-[1440px] mx-auto w-full">
    {% block content %}{% endblock %}
  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer class="relative z-10 border-t border-outline-variant/30 mt-auto">
    <div class="max-w-[1440px] mx-auto w-full px-gutter py-8">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="logo-icon w-8 h-8 text-sm">R</div>
          <span class="font-label-md text-label-md text-on-surface-variant opacity-80">ResumeMatch AI</span>
        </div>
        <div class="flex items-center gap-6">
          <a href="#" class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors no-underline">Privacy Policy</a>
          <a href="#" class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors no-underline">Terms of Service</a>
        </div>
        <p class="text-label-sm font-label-sm text-outline">&copy; 2024 ResumeMatch AI. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- ==================== TOAST CONTAINER ==================== -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-toast flex flex-col gap-3"></div>

  <!-- ==================== LOADING OVERLAY ==================== -->
  <div id="loading-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-overlay hidden flex items-center justify-center">
    <div class="bg-surface rounded-2xl p-8 flex flex-col items-center gap-4 shadow-2xl scale-in">
      <div class="loading-spinner"></div>
      <p id="loading-text" class="text-on-surface font-headline-md text-headline-md">Analyzing Resume...</p>
    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script>
    (function() {
      var html = document.documentElement;
      var toggle = document.getElementById('darkModeToggle');
      if (!toggle) return;
      var darkIcon = toggle.querySelector('.dark-icon');
      var lightIcon = toggle.querySelector('.light-icon');

      function syncIcons() {
        var isDark = html.classList.contains('dark');
        darkIcon.style.display = isDark ? 'none' : '';
        lightIcon.style.display = isDark ? '' : 'none';
      }
      syncIcons();

      toggle.addEventListener('click', function() {
        html.classList.toggle('dark');
        var isDark = html.classList.contains('dark');
        localStorage.setItem('darkMode', String(isDark));
        syncIcons();
      });

      // Mobile menu
      var menuBtn = document.getElementById('mobileMenuBtn');
      var menuClose = document.getElementById('mobileMenuClose');
      var mobileMenu = document.getElementById('mobileMenu');

      if (menuBtn && mobileMenu && menuClose) {
        menuBtn.addEventListener('click', function() { mobileMenu.classList.add('open'); });
        menuClose.addEventListener('click', function() { mobileMenu.classList.remove('open'); });
        var links = mobileMenu.querySelectorAll('a');
        for (var i = 0; i < links.length; i++) {
          links[i].addEventListener('click', function() { mobileMenu.classList.remove('open'); });
        }
      }
    })();
  </script>
  <script src="{{ url_for('static', filename='js/app.js') }}?v=3"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
