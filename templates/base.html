<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ResumeMatch AI — AI-powered resume screening and matching system" />
  <title>{% block title %}ResumeMatch AI{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'tertiary-container': 'var(--tertiary-container)',
            'inverse-surface': 'var(--inverse-surface)',
            'error-container': 'var(--error-container)',
            'on-error': 'var(--on-error)',
            'surface': 'var(--surface)',
            'on-secondary-fixed-variant': 'var(--on-secondary-fixed-variant)',
            'tertiary': 'var(--tertiary)',
            'surface-container-high': 'var(--surface-container-high)',
            'surface-container-lowest': 'var(--surface-container-lowest)',
            'primary': 'var(--primary)',
            'on-tertiary': 'var(--on-tertiary)',
            'tertiary-fixed': 'var(--tertiary-fixed)',
            'on-surface': 'var(--on-surface)',
            'background': 'var(--background)',
            'on-secondary-container': 'var(--on-secondary-container)',
            'tertiary-fixed-dim': 'var(--tertiary-fixed-dim)',
            'surface-dim': 'var(--surface-dim)',
            'surface-tint': 'var(--surface-tint)',
            'primary-fixed-dim': 'var(--primary-fixed-dim)',
            'on-primary-container': 'var(--on-primary-container)',
            'on-primary-fixed': 'var(--on-primary-fixed)',
            'secondary-fixed-dim': 'var(--secondary-fixed-dim)',
            'on-surface-variant': 'var(--on-surface-variant)',
            'outline': 'var(--outline)',
            'on-secondary': 'var(--on-secondary)',
            'surface-variant': 'var(--surface-variant)',
            'error': 'var(--error)',
            'on-primary-fixed-variant': 'var(--on-primary-fixed-variant)',
            'surface-container': 'var(--surface-container)',
            'inverse-on-surface': 'var(--inverse-on-surface)',
            'surface-container-low': 'var(--surface-container-low)',
            'secondary-fixed': 'var(--secondary-fixed)',
            'primary-fixed': 'var(--primary-fixed)',
            'primary-container': 'var(--primary-container)',
            'on-primary': 'var(--on-primary)',
            'on-tertiary-fixed-variant': 'var(--on-tertiary-fixed-variant)',
            'on-background': 'var(--on-background)',
            'secondary-container': 'var(--secondary-container)',
            'on-tertiary-container': 'var(--on-tertiary-container)',
            'on-error-container': 'var(--on-error-container)',
            'secondary': 'var(--secondary)',
            'surface-container-highest': 'var(--surface-container-highest)',
            'on-secondary-fixed': 'var(--on-secondary-fixed)',
            'surface-bright': 'var(--surface-bright)',
            'on-tertiary-fixed': 'var(--on-tertiary-fixed)',
            'inverse-primary': 'var(--inverse-primary)',
            'outline-variant': 'var(--outline-variant)'
          },
          borderRadius: {
            DEFAULT: '0.25rem',
            lg: '0.5rem',
            xl: '0.75rem',
            '2xl': '1rem',
            full: '9999px'
          },
          spacing: {
            base: '4px',
            xs: '0.5rem',
            gutter: '24px',
            xl: '4rem',
            md: '1.5rem',
            'margin-desktop': '48px',
            'margin-mobile': '16px',
            sm: '1rem',
            lg: '2.5rem'
          },
          fontFamily: {
            'body-md': ['Inter'],
            'body-lg': ['Inter'],
            'headline-md': ['Inter'],
            display: ['Inter'],
            'headline-lg': ['Inter'],
            'headline-lg-mobile': ['Inter'],
            'label-md': ['Geist'],
            'label-sm': ['Geist']
          },
          fontSize: {
            'body-md': ['16px', { lineHeight: '1.6', fontWeight: '400' }],
            'body-lg': ['18px', { lineHeight: '1.6', fontWeight: '400' }],
            'headline-md': ['24px', { lineHeight: '1.3', letterSpacing: '-0.01em', fontWeight: '600' }],
            display: ['48px', { lineHeight: '1.1', letterSpacing: '-0.02em', fontWeight: '700' }],
            'headline-lg': ['32px', { lineHeight: '1.2', letterSpacing: '-0.02em', fontWeight: '700' }],
            'headline-lg-mobile': ['24px', { lineHeight: '1.2', letterSpacing: '-0.01em', fontWeight: '700' }],
            'label-md': ['14px', { lineHeight: '1.4', letterSpacing: '0.02em', fontWeight: '500' }],
            'label-sm': ['12px', { lineHeight: '1.2', fontWeight: '600' }]
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600&display=swap" rel="stylesheet" />

  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=2" />

  {% block head %}{% endblock %}
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative antialiased">
  <!-- Background Grid Pattern -->
  <div class="absolute inset-0 bg-grid-pattern pointer-events-none z-0"></div>

  <!-- ==================== HEADER ==================== -->
  <header class="fixed top-0 left-0 right-0 z-nav nav-glass">
    <nav class="max-w-[1440px] mx-auto w-full px-gutter flex items-center justify-between h-[72px]">
      <!-- Logo -->
      <a href="{{ url_for('index') }}" class="flex items-center gap-3 no-underline group">
        <div class="logo-icon group-hover:scale-105 transition-transform duration-200">R</div>
        <span class="font-headline-md text-headline-md text-on-surface hidden sm:block">
          Resume<span class="gradient-text-subtle">Match</span> AI
        </span>
      </a>

      <!-- Contact Me -->
      <div class="flex items-center gap-3">
        <a href="https://wa.me/918828783516?text=hey%20udayraj%20%2C%20i%20liked%20your%20work%20lets%20connect" target="_blank" rel="noopener noreferrer" class="btn-primary flex items-center gap-2 bg-[#25D366] hover:bg-[#128C7E] text-white border-none shadow-sm shadow-[#25D366]/20">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
          </svg>
          Contact Me
        </a>
      </div>
    </nav>
  </header>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="flex-1 relative z-10 pt-[100px] pb-xl px-gutter max-w-[1440px] mx-auto w-full">
    {% block content %}{% endblock %}
  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer class="relative z-10 border-t border-outline-variant/30 mt-auto">
    <div class="max-w-[1440px] mx-auto w-full px-gutter py-8">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <!-- Brand -->
        <div class="flex items-center gap-3">
          <div class="logo-icon w-8 h-8 text-sm">R</div>
          <span class="font-label-md text-label-md text-on-surface-variant opacity-80">
            ResumeMatch AI
          </span>
        </div>

        <!-- Links -->
        <div class="flex items-center gap-6">
          <a href="#" class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors no-underline">
            Privacy Policy
          </a>
          <a href="#" class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors no-underline">
            Terms of Service
          </a>
          <a href="#" class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors no-underline">
            Contact Support
          </a>
        </div>

        <!-- Copyright -->
        <p class="text-label-sm font-label-sm text-outline">
          &copy; 2026 ResumeMatch AI. All rights reserved.
        </p>
      </div>
    </div>
  </footer>

  <!-- ==================== TOAST CONTAINER ==================== -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-toast flex flex-col gap-3"></div>

  <!-- ==================== LOADING OVERLAY ==================== -->
  <div id="loading-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-overlay hidden flex items-center justify-center">
    <div class="bg-surface rounded-2xl p-8 flex flex-col items-center gap-4 shadow-2xl scale-in">
      <div class="loading-spinner"></div>
      <p id="loading-text" class="text-on-surface font-headline-md text-headline-md">
        Analyzing Resume...
      </p>
    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->
  <script src="{{ url_for('static', filename='js/app.js') }}?v=2"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
